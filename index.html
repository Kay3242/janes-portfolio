<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jane's Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="#" class="logo">Jane’s Portfolio</a>

    <nav class="nav">
      <a href="#" class="nav-link active">Home</a>
      <a href="#" class="nav-link">Works</a>
      <a href="#" class="nav-link">Contact</a>
    </nav>
  </header>

  <main class="home-scroll" id="homeScroll">
    <section class="portfolio-stage">
      <div class="page page-one">
        <div class="page-bg page-one-bg"></div>

        <div class="hero-center">
          <h1 class="hero-title">
            <span id="typingText"></span>
          </h1>
        </div>

        <img src="assets/hand_hero.png" alt="" class="hero-hand" />
      </div>

      <div class="page page-two">
        <div class="page-bg page-two-bg"></div>

        <h2 class="second-title">
          <span id="secondTypingText"></span>
        </h2>

        <img src="assets/astronaut_reading.png" alt="" class="astronaut" />
      </div>

      <div class="page page-three">
          <div class="page-bg page-three-bg"></div>

          <h2 class="third-title">
              <span id="thirdTypingText"></span>
          </h2>

          <img src="assets/meadow.png" alt="" class="tv-scene" />
      </div>

      <div class="page page-four">
      <div class="page-bg page-four-bg"></div>

      <div class="fourth-content">
          <h2 class="fourth-title">
          <span id="fourthTypingText"></span>
          </h2>

          <a href="#" class="explore-button">Explore</a>
      </div>

      <img src="assets/sign.png" alt="" class="sign-scene" />
      </div>
    </section>
  </main>

  <section class="explore-overlay" id="exploreOverlay">
    <button type="button" class="overlay-back-button" id="overlayBackButton">
      ‹ Go Back
    </button>

    <div class="explore-panel">
      <h2 class="explore-question">
        <span id="exploreTypingText"></span>
      </h2>

      <form class="tag-form" id="tagForm">
        <label class="tag-label" for="tagInput">Tags</label>

          <div class="tag-input-wrap" id="selectedTags">
            <input id="tagInput" type="text" aria-label="Tags" />
          </div>

          <div class="tag-options" id="tagOptions">
            <button type="button">Visual Design</button>
            <button type="button">Prints</button>
            <button type="button">Animation</button>
            <button type="button">Video Editing</button>
            <button type="button">Branding</button>
            <button type="button">Figma</button>
            <button type="button">Front-End Development</button>
            <button type="button">UI/UX</button>
            <button type="button">Graphic Design</button>
          </div>

          <button type="button" class="continue-button">Continue</button>
      </form>
    </div>
  </section>

  <section class="loading-page" id="loadingPage">
    <img src="assets/hot air balloon.png" alt="" class="loading-balloon" />

    <div class="loading-content">
      <div class="loading-bar">
        <div class="loading-bar-fill"></div>
      </div>

      <p class="loading-text">Curating your experience...</p>
    </div>
  </section>
  
  <script src="script.js"></script>
</body>
</html>
